    <style id="jf-real-splash-style">
      #jf-real-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #24363F;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #jf-real-splash .jf-splash-terrain {
        position: absolute;
        inset: -20%;
        margin: 0;
        padding: 0;
        animation: jfSplashTerrainDrift 20s ease-in-out infinite alternate;
      }

      @keyframes jfSplashTerrainDrift {
        0%   { transform: translate(12%, 8%); }
        100% { transform: translate(-12%, -8%); }
      }

      #jf-real-splash .jf-splash-terrain svg {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        margin: 0;
        padding: 0;
      }

      #jf-real-splash .jf-splash-overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        margin: 0;
        padding: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.15) 100%);
        pointer-events: none;
      }

      #jf-real-splash .jf-splash-content {
        position: relative;
        z-index: 3;
        width: 100%;
        max-width: 900px;
        padding: 0 48px;
        margin: 0;
        text-align: center;
        box-sizing: border-box;
      }

      #jf-real-splash .jf-splash-title {
        font-family: 'Roboto Slab', Georgia, serif;
        font-weight: 700;
        font-size: clamp(40px, 6vw, 72px);
        color: #E8E0C0;
        line-height: 1.05;
        letter-spacing: -0.01em;
        margin: 0 0 20px 0;
        padding: 0;
      }

      #jf-real-splash .jf-splash-subtitle {
        font-family: 'Roboto', Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(16px, 1.8vw, 22px);
        color: #E8E9EB;
        line-height: 1.4;
        margin: 0 0 52px 0;
        padding: 0;
      }

      #jf-real-splash .jf-splash-arrow-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        margin: 0;
        background: transparent;
        border: 1px solid rgba(232, 233, 235, 0.5);
        border-radius: 50%;
        cursor: pointer;
        padding: 0;
        transition: border-color 0.25s ease, background-color 0.25s ease;
      }
      #jf-real-splash .jf-splash-arrow-btn:hover {
        border-color: rgba(232, 233, 235, 0.85);
        background-color: rgba(232, 233, 235, 0.05);
      }
      #jf-real-splash .jf-splash-arrow-btn:focus-visible {
        outline: 2px solid #E8E0C0;
        outline-offset: 4px;
      }

      #jf-real-splash .jf-splash-arrow-icon {
        display: block;
        width: 24px;
        height: 24px;
        margin: 0;
        animation: jfSplashArrowDrift 2.4s ease-in-out 1.7s infinite;
      }

      @keyframes jfSplashArrowDrift {
        0%   { transform: translateY(-2px); opacity: 0.5;  }
        50%  { transform: translateY(3px);  opacity: 0.85; }
        100% { transform: translateY(-2px); opacity: 0.5;  }
      }

      @media (prefers-reduced-motion: reduce) {
        #jf-real-splash .jf-splash-terrain { animation: none; transform: translate(0%, 0%); }
        #jf-real-splash .jf-splash-arrow-icon { animation: none; opacity: 0.6; }
      }

      @media (max-width: 640px) {
        #jf-real-splash .jf-splash-content { padding: 0 24px; }
        #jf-real-splash .jf-splash-terrain {
          inset: -30%;
          animation: jfSplashTerrainDriftMobile 20s ease-in-out infinite alternate;
        }
      }

      @keyframes jfSplashTerrainDriftMobile {
        0%   { transform: translate(18%, 12%); }
        100% { transform: translate(-18%, -12%); }
      }
    </style>

    <script>
      (function() {
        const jsonp = {}
        const allowOutsideDriver = true

        function shouldLoad() {
          if(allowOutsideDriver)
            return true

          return window.location.protocol === 'file:'
            || (window !== window.parent && typeof window.parent.IsLmsPresent === 'function')
        }

        function loadModule(manifest) {
          const p = []

          if (manifest['.css'] != null) {
            for (var idx = 0; idx < manifest['.css'].length; idx++) {
              p.push(new Promise((resolve, reject) => {
                var link = document.createElement('link')
                link.onload = resolve
                link.onerror = reject
                link.rel = 'stylesheet'
                link.href = 'lib/' + manifest['.css'][idx]
                document.body.appendChild(link)
              }))
            }
          }

          if (manifest['.js'] != null) {
            for (var idx = 0; idx < manifest['.js'].length; idx++) {
              p.push(new Promise((resolve, reject) => {
                var script = document.createElement('script')
                script.onload = resolve
                script.onerror = reject
                script.src = 'lib/' + manifest['.js'][idx]
                document.body.appendChild(script)
              }))
            }
          }

          return Promise.all(p)
        }

        function deserialize(str) {
          const buffer = Uint8Array.from(atob(str), c => c.charCodeAt(0))
          const json = new TextDecoder().decode(buffer)
          const result = JSON.parse(json)
          return result
        }

        function __preventLoad() {
          let appDiv = document.getElementById('app')
          let errMsgSpan = document.createElement('span')
          let errMsgText = document.createTextNode('Error: Content launched outside of a supported LMS enviroment.')

          errMsgSpan.appendChild(errMsgText)
          appDiv.appendChild(errMsgSpan)

          throw new Error("Content launched outside of a supported LMS enviroment.")
        }

        function __loadEntry() {
          return loadModule(JSON.parse(document.getElementById('__ENTRY__').textContent))
        }

        function __loadRemoteEntry(name) {
          const manifest = JSON.parse(document.getElementById('__REMOTE_ENTRIES__').textContent)
          if (manifest[name] == null) throw new Error(`Missing manifest for remote entry "${name}".`)
          return loadModule(manifest[name])
